name: CI

on:
    pull_request:
    push:
        branches:
            - main
    schedule:
        - cron: "37 6 * * 1-5"

permissions:
    contents: read

env:
    RUST_BACKTRACE: 1
    CARGO_TERM_COLOR: always

jobs:
    test:
        name: Build & Test ${{ matrix.target }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      just_goals: build
                    - target: x86_64-apple-darwin
                      os: macos-latest
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
        runs-on: ${{ matrix.os }}
        env:
            CARGO_BUILD_TARGET: ${{ matrix.target }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  submodules: recursive

            - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
              with:
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            - uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff # v3.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - run: just ${{ matrix.just_goals || 'build test' }}

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  submodules: recursive

            - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
              with:
                  components: rustfmt, clippy

            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            - uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff # v3.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - run: just lint

    should-publish:
        name: Check if version changed
        runs-on: ubuntu-latest
        outputs:
            is_new_version: ${{ steps.check.outputs.is_new_version }}
            publish_tag: ${{ steps.check.outputs.publish_tag }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  submodules: recursive

            - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            - id: check
              run: |
                  CURRENT_VERSION="$(./scripts/get_current_version.sh tiktoken-rs)"
                  echo "Current version: $CURRENT_VERSION"

                  SPARSE_INDEX_URL="https://index.crates.io/ti/kt/tiktoken-rs"
                  if curl -s --retry 3 -H "User-Agent: tiktoken-rs-ci (https://github.com/zurawiki/tiktoken-rs)" \
                      "$SPARSE_INDEX_URL" | grep -Fq "\"vers\":\"$CURRENT_VERSION\""; then
                    echo "Version $CURRENT_VERSION already published"
                    echo "is_new_version=no" >> "$GITHUB_OUTPUT"
                  else
                    echo "Version $CURRENT_VERSION is new"
                    echo "is_new_version=yes" >> "$GITHUB_OUTPUT"
                    echo "publish_tag=v$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
                  fi

    release:
        name: Release
        needs: [test, lint, should-publish]
        if: needs.should-publish.outputs.is_new_version == 'yes' && github.ref == 'refs/heads/main'
        permissions:
            contents: write
        uses: ./.github/workflows/release.yml
        with:
            publish-tag: ${{ needs.should-publish.outputs.publish_tag }}
        secrets:
            CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
